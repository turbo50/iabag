AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "iabag backend \u2014 produits, avis, commandes"
Parameters:
  CognitoUserPoolId:
    Type: String
    Description: ID du User Pool Cognito (ex. eu-west-3_XXXXXXXXX)
  CognitoUserPoolClientId:
    Type: String
    Description: ID du Client Cognito (App Client ID)
  StageName:
    Type: String
    Default: prod
    Description: Nom du stage API Gateway
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
    - arm64
    MemorySize: 256
    Timeout: 10
    Environment:
      Variables:
        TABLE_PRODUIT: iabag_produit
        TABLE_CLIENT: iabag_client
        TABLE_AVIS: iabag_avis
        TABLE_COMMANDE: iabag_commande
        REGION:
          Ref: AWS::Region
Resources:
  IabagHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName:
        Ref: StageName
      CorsConfiguration:
        AllowMethods:
        - GET
        - POST
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowOrigins:
        - '*'
        MaxAge: 300
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer:
                Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}
              audience:
              - Ref: CognitoUserPoolClientId
            IdentitySource: $request.header.Authorization
  ProduitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: iabag_produit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: code_produit
        AttributeType: S
      - AttributeName: sku
        AttributeType: S
      KeySchema:
      - AttributeName: code_produit
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: sku-index
        KeySchema:
        - AttributeName: sku
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  ClientTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: iabag_client
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: code_client
        AttributeType: S
      KeySchema:
      - AttributeName: code_client
        KeyType: HASH
  AvisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: iabag_avis
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: code_produit
        AttributeType: S
      - AttributeName: review_key
        AttributeType: S
      KeySchema:
      - AttributeName: code_produit
        KeyType: HASH
      - AttributeName: review_key
        KeyType: RANGE
  CommandeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: iabag_commande
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: code_commande
        AttributeType: S
      - AttributeName: code_client
        AttributeType: S
      - AttributeName: date_commande
        AttributeType: S
      KeySchema:
      - AttributeName: code_commande
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: client-date-index
        KeySchema:
        - AttributeName: code_client
          KeyType: HASH
        - AttributeName: date_commande
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
  DynamoPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:Scan
          Resource:
          - Fn::GetAtt:
            - ProduitTable
            - Arn
          - Fn::Sub: ${ProduitTable.Arn}/index/*
          - Fn::GetAtt:
            - ClientTable
            - Arn
          - Fn::GetAtt:
            - AvisTable
            - Arn
          - Fn::GetAtt:
            - CommandeTable
            - Arn
          - Fn::Sub: ${CommandeTable.Arn}/index/*
  GetListProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-get-list-product
      CodeUri: GetListProductFunction
      Handler: functions/products_get_list.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: GET
            Path: /products
    Metadata:
      SamResourceId: GetListProductFunction
  GetProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-get-product
      CodeUri: GetProductFunction
      Handler: functions/products_get_one.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: GET
            Path: /products/{code}
    Metadata:
      SamResourceId: GetProductFunction
  GetProductBySkuFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-get-product-by-sku
      CodeUri: GetProductBySkuFunction
      Handler: functions/products_get_by_sku.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: GET
            Path: /products/sku/{sku}
    Metadata:
      SamResourceId: GetProductBySkuFunction
  GetReviewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-get-reviews
      CodeUri: GetReviewsFunction
      Handler: functions/reviews_get_list.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: GET
            Path: /products/{code}/reviews
    Metadata:
      SamResourceId: GetReviewsFunction
  PutReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-put-review
      CodeUri: PutReviewFunction
      Handler: functions/reviews_put.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: POST
            Path: /products/{code}/reviews
            Auth:
              Authorizer: CognitoJwtAuthorizer
    Metadata:
      SamResourceId: PutReviewFunction
  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-create-order
      CodeUri: CreateOrderFunction
      Handler: functions/orders_create.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: POST
            Path: /orders
            Auth:
              Authorizer: CognitoJwtAuthorizer
    Metadata:
      SamResourceId: CreateOrderFunction
  ListMyOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-list-my-orders
      CodeUri: ListMyOrdersFunction
      Handler: functions/orders_list_my.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: GET
            Path: /clients/me/orders
            Auth:
              Authorizer: CognitoJwtAuthorizer
    Metadata:
      SamResourceId: ListMyOrdersFunction
  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iabag-get-order
      CodeUri: GetOrderFunction
      Handler: functions/orders_get_one.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: IabagHttpApi
            Method: GET
            Path: /orders/{code}
            Auth:
              Authorizer: CognitoJwtAuthorizer
    Metadata:
      SamResourceId: GetOrderFunction
Outputs:
  ApiBaseUrl:
    Description: "URL de base de l'API (\xE0 mettre dans assets/js/config.js)"
    Value:
      Fn::Sub: https://${IabagHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
