<!--MiniCart Drawer-->
<div class="minicart-right-drawer modal right fade" id="minicart-drawer" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div id="cart-drawer" class="block block-cart">

        <div class="minicart-header">
          <a href="javascript:void(0);" class="close-cart" data-bs-dismiss="modal" aria-label="Fermer">
            <i class="an an-times-r" aria-hidden="true" data-bs-toggle="tooltip" data-bs-placement="left" title="Fermer"></i>
          </a>

          <h4 class="fs-6 text-black">
            Votre panier (<span id="minicart-count">0</span>)
          </h4>
        </div>

        <div class="minicart-content">
          <!-- LISTE RENDUE PAR cart_ui.js -->
          <ul id="minicart-items" class="m-0 clearfix" aria-live="polite" aria-busy="false"></ul>

          <!-- TEMPLATE UTILISÉ PAR cart_ui.js -->
          <template id="minicart-item-tpl">
            <li class="item d-flex align-items-start" data-line-id="">
              <a class="product-image" href="">
                <img class="blur-up lazyload" src="" data-src="" alt="" title="">
              </a>

              <div class="product-details">
                <a class="product-title" href=""></a>
                <div class="variant-cart my-1"></div>
                <div class="priceRow">
                  <div class="product-price">
                    <span class="money"></span>
                  </div>
                </div>
              </div>

              <div class="qtyDetail text-center ms-auto">
                <div class="wrapQtyBtn">
                  <div class="qtyField">
                    <!-- IMPORTANT: data-action pour ton JS -->
                    <button type="button" class="qtyBtn minus" data-action="dec" aria-label="Diminuer">
                      <i class="icon an an-minus-r" aria-hidden="true"></i>
                    </button>

                    <!-- IMPORTANT: input.qty pour ton JS -->
                    <input type="number" min="1" value="1" class="qty rounded-0">

                    <button type="button" class="qtyBtn plus" data-action="inc" aria-label="Augmenter">
                      <i class="icon an an-plus-l" aria-hidden="true"></i>
                    </button>
                  </div>

                  <!-- IMPORTANT: data-action remove pour ton JS -->
                  <button type="button" class="remove btn btn-link p-0" data-action="remove" aria-label="Supprimer">
                    Supprimer
                  </button>
                </div>
              </div>
            </li>
          </template>

          <!-- Etat vide, géré par cart_ui.js -->
          <div id="minicart-empty" style="display:none;" class="py-4 text-center">
            <p class="mb-3">Votre panier est vide.</p>
            <a href="index.html" class="btn btn-outline-dark">Continuer mes achats</a>
          </div>
        </div>

        <!-- Bottom du thème, mais connecté au subtotal dynamique -->
        <div class="minicart-bottom text-black">
          <div class="shipinfo text-center mb-3 text-uppercase">
            <p class="freeShipMsg">
              <i class="an an-truck fs-5 me-2 align-middle"></i>
              Livraison offerte selon conditions.
            </p>
          </div>

          <div class="subtotal">
            <span>Sous-total :</span>
            <span class="product-price" id="minicart-subtotal">0,00 €</span>
          </div>

          <!-- (Optionnel) tu peux garder ou retirer cette case -->
          <div class="agree-check customCheckbox clearfix">
            <input id="prTearm" name="tearm" type="checkbox" value="tearm" />
            <label for="prTearm"> J’accepte les conditions générales</label>
          </div>

          <!-- Commander (hook JS) -->
          <button
            type="button"
            class="w-100 px-2 py-2 lh-base my-2 btn btn-outline-primary proceed-to-checkout"
            data-minicart-checkout
          >
            Commander
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
<!--End MiniCart Drawer-->
