<!doctype html>
<html lang="fr">
    <head>
        <include src="../src/partials/header.html"></include>

        <!-- Aides UX (optionnel) -->
        <style>
            .wishlist-empty { padding: 2rem 0; text-align: center; }
            .wishlist-empty .btn { margin-top: .75rem; }
            .wishlist-loading { padding: 1.5rem 0; text-align:center; opacity:.8; }
        </style>
    </head>

    <body class="my-wishlist-page">
        <!-- Page Loader -->
        <div id="pre-loader"><img src="assets/images/loader.gif" alt="Chargement..." /></div>
        <!-- End Page Loader -->

        <!--Page Wrapper-->
        <div class="page-wrapper">

            <include src="../src/partials/haut_de_page.html"></include>

            <!--Body Container-->
            <div id="page-content">
                <!--Collection Banner-->
                <div class="collection-header">
                    <div class="collection-hero">
                        <div class="collection-hero__image"></div>
                        <div class="collection-hero__title-wrapper container">
                            <h1 class="collection-hero__title">Mes favoris</h1>
                            <div class="breadcrumbs text-uppercase mt-1 mt-lg-2">
                                <a href="index.html" title="Retour à l’accueil">Accueil</a><span>|</span><span class="fw-bold">Mes favoris</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!--End Collection Banner-->

                <!--Main Content-->
                <div class="container">
                    <!--Favoris-->
                    <form action="#" method="post" onsubmit="return false;">
                        <div class="wishlist-table table-content text-nowrap table-responsive py-2">
                            <table class="table table-bordered align-middle">
                                <thead class="bg-light thead-bg">
                                    <tr>
                                        <th class="product-name text-center alt-font">Supprimer</th>
                                        <th class="product-price text-center alt-font">Image</th>
                                        <th class="product-name alt-font">Produit</th>
                                        <th class="product-price text-center alt-font">Prix unitaire</th>
                                        <th class="stock-status text-center alt-font">Stock</th>
                                        <th class="product-subtotal text-center alt-font">Ajouter au panier</th>
                                    </tr>
                                </thead>

                                <!-- Rempli dynamiquement -->
                                <tbody id="wishlist-tbody">
                                    <tr>
                                        <td colspan="6" class="text-center py-4">
                                            Veuillez activer JavaScript pour afficher vos favoris.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            <!-- états -->
                            <div id="wishlist-loading" class="wishlist-loading d-none">Chargement de vos favoris…</div>
                            <div id="wishlist-empty" class="wishlist-empty d-none">
                                <div class="h6 mb-2">Vous n’avez aucun favori pour le moment.</div>
                                <a href="index.html" class="btn btn-primary btn-sm rounded-1">Découvrir les produits</a>
                            </div>
                        </div>
                    </form>
                    <!--End Favoris-->
                </div>
                <!--End Main Content-->
            </div>
            <!--End Body Container-->

            <!--Footer-->
            <include src="../src/partials/footer.html"></include>
            <!--End Footer-->

            <!--Scoll Top-->
            <span id="site-scroll"><i class="icon an an-chevron-up"></i></span>
            <!--End Scoll Top-->

            <!--MiniCart Drawer-->
                <include src="../src/partials/minicart-drawer.html"></include>
            <!--End MiniCart Drawer-->
            
            <div class="modalOverly"></div>

            <!--Including Javascript-->
            <include src="../src/partials/scripts.html"></include>

            <!-- Favoris logic (module) -->
            <script type="module">
                import { CONFIG } from "./assets/js/config.js";
                import { AUTH_STORAGE_KEYS } from "./assets/js/auth_storage_keys.js";

                const API_BASE_URL = CONFIG?.API_BASE_URL;

                const $ = (sel) => document.querySelector(sel);

                function show(el, on) {
                    if (!el) return;
                    el.classList.toggle("d-none", !on);
                }

                function safeJsonParse(s) {
                    if (!s) return null;
                    try { return JSON.parse(s); } catch { return null; }
                }

                function getStoredTokens() {
                    return safeJsonParse(localStorage.getItem(AUTH_STORAGE_KEYS.tokens));
                }

                function pickJwt(tokensObj) {
                    if (!tokensObj) return null;

                    // OAuth classique
                    if (typeof tokensObj.access_token === "string" && tokensObj.access_token.length > 20) return tokensObj.access_token;
                    if (typeof tokensObj.id_token === "string" && tokensObj.id_token.length > 20) return tokensObj.id_token;

                    // Formats alternatifs
                    if (typeof tokensObj.tokens?.accessToken === "string") return tokensObj.tokens.accessToken;
                    if (typeof tokensObj.tokens?.idToken === "string") return tokensObj.tokens.idToken;

                    if (typeof tokensObj.accessToken === "string") return tokensObj.accessToken;
                    if (typeof tokensObj.idToken === "string") return tokensObj.idToken;

                    return null;
                }

                function getAuthHeaderValue() {
                    const tokens = getStoredTokens();
                    const jwt = pickJwt(tokens);
                    if (!jwt) return null;
                    return jwt.startsWith("Bearer ") ? jwt : `Bearer ${jwt}`;
                }

                function ensureConfigured() {
                    if (!API_BASE_URL) {
                        throw new Error("CONFIG.API_BASE_URL est vide (assets/js/config.js).");
                    }
                }

                async function apiFetch(path, opts = {}) {
                    ensureConfigured();

                    const auth = getAuthHeaderValue();
                    if (!auth) {
                        // Mémorise la page de retour (si votre flow l'utilise)
                        try { localStorage.setItem(AUTH_STORAGE_KEYS.next, "my-wishlist.html"); } catch {}
                        throw new Error("Non authentifié : jeton manquant. Veuillez vous connecter pour consulter vos favoris.");
                    }

                    const url = API_BASE_URL.replace(/\/$/, "") + path;

                    const res = await fetch(url, {
                        ...opts,
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": auth,
                            ...(opts.headers || {}),
                        },
                    });

                    const text = await res.text();
                    let data = null;
                    try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }

                    if (!res.ok) {
                        const msg = data?.error || data?.message || `Erreur HTTP ${res.status}`;
                        const err = new Error(msg);
                        err.status = res.status;
                        err.data = data;
                        throw err;
                    }

                    return data;
                }

                /**
                 * NOTE :
                 * Le backend renvoie actuellement des items de table :
                 * { code_client, code_produit, created_at? }
                 * Les colonnes Image / Prix / Stock restent donc en "—" (placeholders),
                 * jusqu'à ce que vous décidiez d'hydrater via GET /products/{code}
                 * ou un endpoint batch.
                 */

                function renderRows(items) {
                    const tbody = $("#wishlist-tbody");
                    if (!tbody) return;

                    if (!items.length) {
                        tbody.innerHTML = "";
                        return;
                    }

                    tbody.innerHTML = items.map((it) => {
                        const codeProduit = it.code_produit ?? it.code ?? "";
                        const safeCode = escapeHtml(String(codeProduit));
                        const productUrl = `product-detail.html?code=${encodeURIComponent(codeProduit)}`;

                        return `
                            <tr data-code="${safeCode}">
                                <td class="product-remove text-center">
                                    <a href="#" class="js-wishlist-remove" data-code="${safeCode}" data-bs-toggle="tooltip" data-bs-placement="top" title="Supprimer">
                                        <i class="icon icon an an-times-l"></i>
                                    </a>
                                </td>

                                <td class="product-thumbnail text-center">
                                    <a href="${productUrl}">
                                        <img src="assets/images/products/100x120.jpg" width="100" alt="" title="">
                                    </a>
                                </td>

                                <td class="product-name">
                                    <h6 class="mb-0">
                                        <a href="${productUrl}">${safeCode}</a>
                                    </h6>
                                    ${it.created_at ? `<div class="small text-muted mt-1">${escapeHtml(it.created_at)}</div>` : ``}
                                </td>

                                <td class="product-price text-center">
                                    <span class="amount fw-500">—</span>
                                </td>

                                <td class="stock text-center">
                                    <span class="text-in-stock">—</span>
                                </td>

                                <td class="product-subtotal text-center">
                                    <a href="cart-style1.html" class="btn btn-small rounded-1 text-nowrap">
                                        Ajouter au panier
                                    </a>
                                </td>
                            </tr>
                        `;
                    }).join("");
                }

                function escapeHtml(s) {
                    return s
                        .replaceAll("&", "&amp;")
                        .replaceAll("<", "&lt;")
                        .replaceAll(">", "&gt;")
                        .replaceAll('"', "&quot;")
                        .replaceAll("'", "&#039;");
                }

                async function loadFavorites() {
                    const loadingEl = $("#wishlist-loading");
                    const emptyEl = $("#wishlist-empty");
                    const tbody = $("#wishlist-tbody");

                    show(loadingEl, true);
                    show(emptyEl, false);

                    try {
                        if (tbody) tbody.innerHTML = "";

                        const data = await apiFetch("/clients/me/wishlist", { method: "GET" });
                        const items = data?.items || [];

                        if (!items.length) {
                            renderRows([]);
                            show(emptyEl, true);
                            return;
                        }

                        renderRows(items);
                        wireRemoveHandlers();
                    } catch (err) {
                        if (tbody) {
                            tbody.innerHTML = `
                                <tr>
                                    <td colspan="6" class="text-center py-4 text-danger">
                                        ${escapeHtml(err.message || "Une erreur est survenue lors du chargement de vos favoris.")}
                                    </td>
                                </tr>
                            `;
                        }
                    } finally {
                        show(loadingEl, false);
                    }
                }

                async function removeItem(codeProduit) {
                    await apiFetch(`/clients/me/wishlist/${encodeURIComponent(codeProduit)}`, { method: "DELETE" });
                }

                function wireRemoveHandlers() {
                    document.querySelectorAll(".js-wishlist-remove").forEach((a) => {
                        a.addEventListener("click", async (e) => {
                            e.preventDefault();
                            const code = e.currentTarget.getAttribute("data-code");
                            if (!code) return;

                            e.currentTarget.classList.add("disabled");
                            try {
                                await removeItem(code);

                                const tr = document.querySelector(`tr[data-code="${CSS.escape(code)}"]`);
                                if (tr) tr.remove();

                                const tbody = $("#wishlist-tbody");
                                const emptyEl = $("#wishlist-empty");
                                const stillHasRows = tbody && tbody.querySelectorAll("tr").length > 0;
                                show(emptyEl, !stillHasRows);
                            } catch (err) {
                                alert(err.message || "Une erreur est survenue lors de la suppression de ce favori.");
                                e.currentTarget.classList.remove("disabled");
                            }
                        });
                    });
                }

                // Chargement auto
                loadFavorites();
            </script>

        </div>
        <!--End Page Wrapper-->
    </body>
</html>
