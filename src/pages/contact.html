<!doctype html>
<html lang="fr">
  <head>
    <include src="../src/partials/header.html"></include>
  </head>

  <body class="contactus-page">
    <div id="pre-loader"><img src="assets/images/loader.gif" alt="Loading..." /></div>

    <div class="page-wrapper">
      <include src="../src/partials/haut_de_page.html"></include>

      <div id="page-content">
        <div class="collection-header">
          <div class="collection-hero mb-0">
            <div class="collection-hero__image"></div>
            <div class="collection-hero__title-wrapper container">
              <h1 class="collection-hero__title">Contact</h1>
              <div class="breadcrumbs text-uppercase mt-1 mt-lg-2">
                <a href="index.html" title="Back to the home page">Accueil</a>
                <span>|</span>
                <span class="fw-bold">Contact</span>
              </div>
            </div>
          </div>
        </div>

        <div class="container-fluid px-0 contact-pstyle1">
          <div class="row g-0 flex-column-reverse flex-lg-row">
            <div class="col-12 col-sm-12 col-md-12 col-lg-6">
              <div class="map-section ratio ratio-16x9 h-100">
                <iframe src="https://www.google.com/maps/embed?pb=" allowfullscreen="" height="650"></iframe>
              </div>
            </div>

            <div class="col-12 col-sm-12 col-md-12 col-lg-6">
              <div class="contact-inner">
                <div class="formFeilds contact-form form-vertical">
                  <h1 class="text-center text-capitalize mb-4">Écrivez-nous</h1>

                  <form name="contactus" method="post" id="contact-form" class="contact-form" novalidate>
                    <div class="row">
                      <div class="col-12">
                        <div class="form-group">
                          <input type="text" id="ContactFormName" name="name" class="form-control" placeholder="Nom" />
                          <span class="error_msg" id="name_error"></span>
                        </div>
                      </div>

                      <div class="col-12">
                        <div class="form-group">
                          <input type="email" id="ContactFormEmail" name="email" class="form-control" placeholder="Email" />
                          <span class="error_msg" id="email_error"></span>
                        </div>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-12">
                        <div class="form-group">
                          <input
                            class="form-control"
                            type="tel"
                            id="ContactFormPhone"
                            name="phone"
                            placeholder="Numéro de téléphone"
                          />
                          <span class="error_msg" id="phone_error"></span>
                        </div>
                      </div>

                      <div class="col-12">
                        <div class="form-group">
                          <input type="text" id="ContactSubject" name="subject" class="form-control" placeholder="Objet" />
                          <span class="error_msg" id="subject_error"></span>
                        </div>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-12">
                        <div class="form-group">
                          <textarea
                            id="ContactFormMessage"
                            name="message"
                            class="form-control"
                            rows="4"
                            placeholder="Corps du message"
                          ></textarea>
                          <span class="error_msg" id="message_error"></span>
                        </div>
                      </div>
                    </div>

                    <!-- honeypot anti-spam -->
                    <div style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">
                      <label for="ContactWebsite">Website</label>
                      <input type="text" id="ContactWebsite" name="website" tabindex="-1" autocomplete="off" />
                    </div>

                    <div class="row">
                      <div class="col-12">
                        <div class="form-group mailsendbtn mb-0 w-100">
                          <input class="btn w-100 rounded" id="contact-submit-btn" type="submit" name="contactus" value="Envoyer" />
                          <div class="loading" id="contact-loading" style="display:none;">
                            <img class="img-fluid" src="assets/images/ajax-loader.gif" alt="loading" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </form>

                  <div class="response-msg" id="contact-response-msg"></div>
                </div>

                <div class="contact-details mt-4 pt-2">
                  <ul class="list-unstyled">
                    <li class="mb-3 address">
                      <strong class="d-block mb-2">ADDRESSE :</strong>
                      <p class="m-0"><i class="icon an an-map-marker-al me-2 d-none"></i> 56 Rue XXX, Paris 75008</p>
                    </li>
                    <li class="mb-3 phone">
                      <strong>TÉLÉPHONE : </strong><i class="icon an an-phone me-2 d-none"></i> (+33) 000 000 0000
                    </li>
                    <li class="email">
                      <strong>COURRIEL:</strong><i class="icon an an-envelope-l me-2 d-none"></i> info@iabag.fr
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <include src="../src/partials/footer.html"></include>

      <span id="site-scroll"><i class="icon an an-chevron-up"></i></span>

      <include src="../src/partials/minicart-drawer.html"></include>

      <div class="modalOverly"></div>

      <include src="../src/partials/scripts.html"></include>
      <script type="module" src="assets/js/contact_page.js"></script>
    </div>
  </body>
</html>
